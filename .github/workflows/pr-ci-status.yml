name: CI Status Notifications

on:
  pull_request:
    types: [opened, synchronize]
  workflow_run:
    workflows: ["CI/CD", ".NET CI"]
    types: [completed]
    branches: [develop, main]

jobs:
  notify-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI to complete
        if: github.event_name == 'pull_request'
        uses: fountainhead/action-wait-for-check@v1.1.0
        id: wait-for-ci
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: "vue-checks"  
          ref: ${{ github.event.pull_request.head.sha }}
          timeoutSeconds: 1800  
          intervalSeconds: 10    

      - name: Get PR info for workflow_run
        id: get-pr
        if: github.event_name == 'workflow_run'
        run: |
          # Получаем номер PR из коммита
          PR_NUMBER=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_commit.id }}/pulls" | \
            jq -r '.[0].number')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          
          if [ "$PR_NUMBER" != "null" ]; then
            PR_TITLE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER" | \
              jq -r '.title')
            echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
          fi

      - name: Send CI result notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message_thread_id: ${{ secrets.TELEGRAM_THREAD_TOPIC }} 
          message: |
            ${{ 
              (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || 
              (github.event_name == 'pull_request' && steps.wait-for-ci.outputs.conclusion == 'success') 
              && '✅ **ПРОВЕРКИ ПРОЙДЕНЫ**' ||
              
              (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure') || 
              (github.event_name == 'pull_request' && steps.wait-for-ci.outputs.conclusion == 'failure') 
              && '❌ **ПРОВЕРКИ УПАЛИ**' ||
              
              (github.event_name == 'pull_request' && steps.wait-for-ci.outputs.conclusion == 'timed_out')
              && '⏰ **ПРОВЕРКИ ЗАНЯЛИ СЛИШКОМ МНОГО ВРЕМЕНИ**'
            }}
            
            📦 **Репозиторий:** ${{ github.repository }}
            📌 **PR:** ${{ 
              github.event.pull_request.title || 
              steps.get-pr.outputs.pr_title || 
              github.event.workflow_run.display_title 
            }}
            ${{ (github.event.pull_request.number || steps.get-pr.outputs.pr_number) && 
              format(' #{0}', github.event.pull_request.number || steps.get-pr.outputs.pr_number) || '' }}
            
            👤 **Автор:** @${{ 
              github.event.pull_request.user.login || 
              github.event.workflow_run.actor.login 
            }}
            
            ${{ github.event_name == 'workflow_run' && format('⚙️ **Workflow:** {0}', github.event.workflow_run.name) || '' }}
            ${{ github.event_name == 'workflow_run' && format('📊 **Результат:** {0}', github.event.workflow_run.conclusion) || '' }}
            
            ${{ 
              (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure') ||
              (github.event_name == 'pull_request' && steps.wait-for-ci.outputs.conclusion == 'failure')
              && '🔴 **Нужно исправить ошибки!**' || 
              
              (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
              (github.event_name == 'pull_request' && steps.wait-for-ci.outputs.conclusion == 'success')
              && '🟢 **Можно мержить!**' || ''
            }}
            
            🔗 ${{ 
              github.event.pull_request.html_url || 
              (steps.get-pr.outputs.pr_number && 
                format('https://github.com/{0}/pull/{1}', github.repository, steps.get-pr.outputs.pr_number)) ||
              github.event.workflow_run.html_url 
            }}